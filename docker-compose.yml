version: '3.8'

services:
  web:
    build: .
    container_name: project-management-app
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./static/uploads:/app/static/uploads
      - ./instance:/app/instance
    environment:
      - SECRET_KEY=your-production-secret-key-change-this
      - DATABASE_URL=sqlite:////app/data/projects.db
      - UPLOAD_FOLDER=/app/static/uploads
      - MAIL_SERVER=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USE_TLS=true
      - MAIL_USERNAME=dulasman5@gmail.com
      - MAIL_PASSWORD=ejna xnwp hear ajnu
      - MAIL_DEFAULT_SENDER=dulasman5@gmail.com
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s