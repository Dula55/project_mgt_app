<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project.name }} - Report</title>

    <!-- Plotly & Bootstrap -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Main Container -->
    <div class="container my-5 flex-grow-1">

        <!-- Project Header -->
        <div class="text-center mb-5">
            <h2 class="fw-bold text-primary">{{ project.name }} - Progress Report</h2>
            <p class="lead text-muted">{{ project.project_type }}</p>
            <span class="badge bg-success fs-6 px-3 py-2">
                Overall Completion: {{ "%.1f"|format(project.completion) }}%
            </span>
        </div>

        <!-- Charts Row -->
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <strong>📊 Task Progress</strong>
                    </div>
                    <div class="card-body">
                        <div id="task_progress_chart" style="height: 400px;"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-info text-white">
                        <strong>📈 Completion Overview</strong>
                    </div>
                    <div class="card-body">
                        <div id="completion_chart" style="height: 400px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="text-center mt-5">
            <a href="{{ url_for('generate_report', project_id=project.id) }}" 
               class="btn btn-success me-2 shadow-sm">
               ⬇ Download Report (Word)
            </a>
            <a href="/" class="btn btn-secondary shadow-sm">← Back to Dashboard</a>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">© 2026 PM-Scheduler & Monitor | Developed by Ramsulone Innovations & Services Ltd</p>
    </footer>

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Plotly Charts -->
    <script>
        // Tasks from Flask
        var tasks = {{ tasks|tojson }};

        // Extract names and progress
        var taskNames = tasks.map(t => t.name);
        var taskProgress = tasks.map(t => t.progress);

        // Bar Chart (Task Progress)
        var trace1 = {
            x: taskNames,
            y: taskProgress,
            type: 'bar',
            marker: { color: 'steelblue' }
        };
        var layout1 = {
            yaxis: { title: 'Progress (%)', range: [0, 100] },
            xaxis: { title: 'Tasks' },
            margin: { t: 30 }
        };
        Plotly.newPlot('task_progress_chart', [trace1], layout1);

        // Pie Chart (Overall Completion)
        var overallCompletion = {{ project.completion }};
        var trace2 = {
            values: [overallCompletion, 100 - overallCompletion],
            labels: ['Completed', 'Remaining'],
            type: 'pie',
            marker: { colors: ['green', 'lightgrey'] }
        };
        var layout2 = { margin: { t: 30 } };
        Plotly.newPlot('completion_chart', [trace2], layout2);
    </script>
</body>
</html>
